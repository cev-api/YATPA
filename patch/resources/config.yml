# Admin teleport command:
# /ytp <player>
# /ytp <player> <targetPlayer>
# /ytp <player> <x> <y> <z> [realm]
# /ytp <x> <y> <z> [realm]
# realm can be overworld, nether, end, or a world name.
settings:
  max_homes_default: 3
  request_timeout_seconds: 60
  request_cooldown_seconds: 30
  teleport_delay_seconds: 5
  cancel_on_move: true
  cancel_on_damage: true
  spawn_radius: 50
  rtp_cooldown_seconds: 300
  rtp:
    default_min_distance: 64
    default_max_distance: 2500
    rtp_to_overworld: false # Allow RTP to teleport to the overworld from other dimensions
    overworld_name: "world" # World used for overworld RTP if rtp_to_overworld is enabled. This is ignored if rtp_to_overworld is false.
    # /rtp blacklist (world names, realms, or namespaced ids)
    # Examples:
    #   - world_the_end
    #   - minecraft:the_nether
    blacklisted_worlds: []
    # Optional per-realm overrides (only apply to Paper RTP search radius):
    # If not set, the defaults above are used.
    realm_min_distance:
      # overworld: 96
      # nether: 48
      # end: 128
    realm_max_distance:
      # overworld: 3000
      # nether: 1500
      # end: 4000
  dimension_restrictions:
    # Set a dimension/world key to true to disable that behavior in that dimension.
    # You can use world names (example: world_nether), realms (overworld/nether/end),
    # or namespaced ids (example: "minecraft:the_nether").
    disable_rtp:
      # nether: true
    disable_teleport:
      # minecraft:the_end: true
  landing:
    mode: EXACT # EXACT or RANDOM_OFFSET
    random_offset_max: 4
  features:
    enabled: true
    tpa: true
    tpahere: true
    homes: true
    rtp: true
  costs:
    enabled: false
    mode: NONE # NONE, XP_LEVELS, ITEM
    xp_levels:
      tpa: 4
      tpahere: 4
      home: 16
      rtp: 30
      rtp:
        overworld: 0
        nether: 0
        end: 0
      spawn: 8
    item:
      material: DIAMOND
      tpa: 2
      tpahere: 2
      home: 20
      rtp: 50
      rtp:
        overworld: 0
        nether: 0
        end: 0
      spawn: 10
    spawn:
      enabled: true # Enable a /spawn command that teleports players to a configurable spawn location.
      first_join_only: true # Only teleport players to spawn on their first join.
      x: 0
      y: 100
      z: 0
      yaw: 0
      pitch: 0
      world: world
sounds:
  request_sent: ENTITY_EXPERIENCE_ORB_PICKUP
  request_received: BLOCK_NOTE_BLOCK_PLING
  countdown: BLOCK_BELL_USE
  success: ENTITY_ENDERMAN_TELEPORT
  cancelled: BLOCK_GLASS_BREAK
effects:
  request_sent: PORTAL
  request_received: ENCHANT
  countdown: WAX_OFF
  success: END_ROD
  cancelled: SMOKE
