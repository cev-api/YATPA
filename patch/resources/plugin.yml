name: YATPA
version: 1.0.7
main: dev.yatpa.paper.YatpaPaperPlugin
api-version: '1.21'
authors: [CevAPI]
commands:
  tp:
    usage: /tp
  tpa:
    usage: /tpa <player>
  yatpa:
    usage: /yatpa <help|reload|settings|gui|set <path> <value>>
  tpahelp:
    usage: /tpahelp
  tphelp:
    usage: /tphelp
  tpahere:
    usage: /tpahere <player>
  tphere:
    usage: /tphere <player>
  tpaccept:
    usage: /tpaccept
  tpdeny:
    usage: /tpdeny
  tpatoggle:
    usage: /tpatoggle
  tpablock:
    usage: /tpablock <player>
  tpaunblock:
    usage: /tpaunblock <player>
  tphome:
    usage: /tphome [set|delete|list|default] [name]
    aliases: [tpahome]
  tpahome:
    usage: /tpahome [set|delete|list|default] [name]
  rtp:
    usage: /rtp
  spawn:
    usage: /spawn
  ytp:
    usage: /ytp <player> [target|x y z [realm]] or /ytp <x y z [realm]>
    permission: yatpa.op.tp
  tpoffline:
    usage: /tpoffline <player>
    permission: yatpa.op.tpoffline
  tpaback:
    usage: /tpaback
    aliases: [tpdeath]
  tpalog:
    usage: /tpalog [page]
    permission: yatpa.op.tpalog
  setspawn:
    usage: /setspawn
    permission: yatpa.op.setspawn
permissions:
  yatpa.op.tp:
    default: op
  yatpa.op.tpoffline:
    default: op
  yatpa.op.reload:
    default: op
  yatpa.op.tpalog:
    default: op
  yatpa.op.setspawn:
    default: op
